<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>YT Notes</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:#0c0c12;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden;}
.title{height:3em;display:flex;align-items:center;gap:6px;padding:0 16px;border-bottom:1px solid #1f1f2e;background:#0a0a10;flex-shrink:0;font-weight:800;letter-spacing:-.01em;font-size:16px;}
.title .b1{color:#fbbf24;} .title .b2{color:#e6e6f0;}
.title .sub{margin-left:auto;font-weight:500;font-size:11px;color:#5a5a72;}
.row{flex:1;display:flex;min-height:0;}
.pane{display:flex;flex-direction:column;min-width:0;min-height:0;}
.pane-yt{width:50%;}
.pane-note{flex:1;}
.resizer{width:7px;cursor:col-resize;background:#13131c;flex-shrink:0;border-left:1px solid #1f1f2e;border-right:1px solid #1f1f2e;transition:background .12s;touch-action:none;}
.resizer:hover,.resizer.drag{background:#2b5a8f;}
/* YT pane */
.yt-bar{display:flex;gap:8px;padding:8px;border-bottom:1px solid #1f1f2e;flex-shrink:0;background:#0c0c12;}
.yt-bar input{flex:1;min-width:0;height:32px;background:#111;border:1px solid #2a2a3a;border-radius:7px;color:#e0e0e0;padding:0 10px;font-size:13px;outline:none;}
.yt-bar input:focus{border-color:#2b5a8f;}
.yt-bar button{height:32px;padding:0 15px;border-radius:7px;border:1px solid #2563eb;background:#2563eb;color:#fff;font-size:13px;cursor:pointer;flex-shrink:0;}
.yt-bar button:hover{background:#1d4ed8;}
.yt-wrap{flex:1;min-height:0;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
#player,#player iframe{width:100%;height:100%;border:0;}
.yt-empty{color:#454552;font-size:13px;text-align:center;padding:20px;}
/* note pane */
.note-tb-wrap{border-bottom:1px solid #1f1f2e;background:#0c0c12;flex-shrink:0;padding:6px 8px;overflow-x:auto;scrollbar-width:none;min-height:42px;display:flex;align-items:center;}
.note-tb-wrap::-webkit-scrollbar{display:none;}
.note-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;}
/* ---- editor (ported from Patchwork) ---- */
.toolbar{display:flex;align-items:center;gap:3px;flex-wrap:nowrap;}
.tbtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;color:#bbb;border:none;background:transparent;font-size:12px;font-weight:500;flex-shrink:0;user-select:none;transition:background .1s;}
.tbtn:hover{background:#23232f;}
.tbtn.on{background:#1e3a5f;color:#60a5fa;}
.tsep{width:1px;height:16px;background:#2a2a3a;margin:0 1px;flex-shrink:0;}
.toolbar select,.toolbar input[type="number"]{height:24px;font-size:11px;padding:0 3px;border:1px solid #2a2a3a;border-radius:5px;background:#111;color:#bbb;}
.toolbar select{max-width:120px;}
.toolbar input[type="number"]{width:40px;text-align:center;}
.color-btn{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:26px;height:26px;border-radius:5px;cursor:pointer;user-select:none;flex-shrink:0;transition:background .1s;}
.color-btn:hover{background:#23232f;}
.color-btn.on{background:#1e3a5f;}
.color-btn .cletter{font-size:12px;font-weight:600;line-height:1;color:#bbb;}
.color-btn .cbar{height:3px;width:16px;border-radius:2px;margin-top:2px;transition:background .15s;}
.img-resize-group{display:none;align-items:center;gap:5px;border:1px solid #3a5a3a;border-radius:7px;padding:2px 6px;height:26px;background:#161e16;}
.img-resize-group.visible{display:flex;}
.img-resize-group .resize-label{font-size:10px;color:#7dba7d;white-space:nowrap;user-select:none;}
.img-resize-group input[type="range"]{width:64px;height:4px;accent-color:#4caf50;cursor:pointer;}
.img-resize-group .resize-val{font-size:10px;color:#7dba7d;min-width:30px;text-align:right;font-family:monospace;}
.editor-valign-wrap{position:static;display:block;overflow:visible;}
.valign-top{}.valign-middle{}.valign-bottom{}
.editor{outline:none;font-size:15px;line-height:1.75;color:#e0e0e0;cursor:text;caret-color:#e0e0e0;padding:20px 24px 35vh 24px;min-height:60vh;}
.line{min-height:1.75em;white-space:pre-wrap;word-break:break-word;}
.img-run{display:inline-block;vertical-align:middle;position:relative;}
.img-run.img-selected img{outline:2px solid #4caf50;border-radius:2px;}
.editor img{max-width:100%;height:auto;border-radius:4px;}
/* color popover */
.color-pop{position:fixed;z-index:10000;background:#1c1c28;border:1px solid #3a3a4a;border-radius:10px;padding:10px;box-shadow:0 8px 28px rgba(0,0,0,.5);width:196px;display:none;}
.color-pop.open{display:block;}
.color-pop .cp-row{display:flex;align-items:center;gap:7px;width:100%;background:transparent;border:none;color:#c0c0d8;font-size:12px;font-family:inherit;cursor:pointer;padding:6px;border-radius:6px;text-align:left;}
.color-pop .cp-row:hover{background:#262635;}
.color-pop .cp-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5a5a72;margin:9px 2px 5px;}
.color-pop .cp-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
.color-pop .cp-fav-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.color-pop .cp-sw{width:100%;aspect-ratio:1;border-radius:4px;border:1px solid rgba(255,255,255,.12);cursor:pointer;position:relative;transition:transform .08s,border-color .1s;padding:0;}
.color-pop .cp-sw:hover{transform:scale(1.14);border-color:rgba(255,255,255,.45);z-index:1;}
.color-pop .cp-fav{width:100%;aspect-ratio:1;border-radius:5px;border:1px solid rgba(255,255,255,.18);cursor:pointer;position:relative;transition:transform .08s;padding:0;}
.color-pop .cp-fav:hover{transform:scale(1.1);}
.color-pop .cp-fav .cp-x{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:#2a2a3a;border:1px solid #4a4a5a;color:#ddd;font-size:10px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;}
.color-pop .cp-fav:hover .cp-x{display:flex;}
.color-pop .cp-fav-add{width:100%;aspect-ratio:1;border-radius:5px;border:1px dashed #4a4a5a;background:transparent;color:#7a7a92;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;padding:0;}
.color-pop .cp-fav-add:hover{border-color:#60a5fa;color:#60a5fa;}
.color-pop .cp-divider{height:1px;background:#2a2a38;margin:9px 0;}
.color-pop .cp-current{position:relative;}
.color-pop .cp-current .cp-cur-sw{width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.25);flex-shrink:0;}
.color-pop .cp-current span:nth-child(2){flex:1;}
.color-pop .cp-current .cp-cur-hex{font-family:monospace;font-size:10px;color:#7a7a92;}
.color-pop .cp-star{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:#2a2a3a;border:1px solid #4a4a5a;color:#fbbf24;font-size:8px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;}
.color-pop .cp-fav:hover .cp-star{display:flex;}
@media(max-width:640px){.row{flex-direction:column;}.pane-yt{width:100%!important;height:45%;}.resizer{display:none;}.pane-note{flex:1;}}

.mode-bar{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.mbtn{width:28px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;color:#bbb;border:none;background:transparent;flex-shrink:0;transition:background .1s;}
.mbtn:hover{background:#23232f;}
.mbtn.on{background:#1e3a5f;color:#60a5fa;}
.inkbar{display:none;align-items:center;gap:9px;}
.ink-color-btn{display:inline-flex;align-items:center;height:26px;padding:0 7px;border-radius:6px;border:1px solid #2a2a3a;background:#15151f;cursor:pointer;flex-shrink:0;}
.ink-color-btn:hover{border-color:#3a3a52;}
.ink-color-btn .icb-sw{width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.28);background:#fff;}
.sizewrap{display:flex;align-items:center;gap:6px;color:#888;font-size:11px;}
.sizewrap input[type=range]{width:80px;accent-color:#60a5fa;cursor:pointer;}
.note-body{position:relative;flex:1;min-height:0;}
.note-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;}
#ink{position:absolute;inset:0;z-index:5;pointer-events:none;touch-action:none;}

.lib-pane{flex:0 0 auto;width:200px;min-width:0;display:flex;flex-direction:column;background:#0a0a10;border-right:1px solid #1f1f2e;}
.lib-head{display:flex;align-items:center;height:38px;padding:0 10px;border-bottom:1px solid #1f1f2e;font-size:12px;font-weight:700;color:#cfcfe2;flex-shrink:0;}
.lib-head button{margin-left:auto;width:24px;height:24px;border-radius:6px;border:1px solid #2a2a3a;background:#15151f;color:#9a9ab0;font-size:15px;cursor:pointer;}
.lib-head button:hover{border-color:#60a5fa;color:#60a5fa;}
.lib-list{flex:1;overflow-y:auto;padding:6px;}
.lib-item{display:flex;align-items:center;gap:6px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:12.5px;color:#c8c8da;}
.lib-item:hover{background:#161620;}
.lib-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lib-del{opacity:0;border:none;background:transparent;color:#888;font-size:14px;cursor:pointer;}
.lib-item:hover .lib-del{opacity:1;}
.lib-empty{color:#454552;font-size:11.5px;padding:12px 8px;line-height:1.5;}
.pane-yt{flex:0 0 auto;width:42%;}
.pane-note{flex:1 1 0;min-width:0;}
.doc-bar{display:flex;align-items:center;gap:8px;height:38px;padding:0 10px;border-bottom:1px solid #1f1f2e;background:#0a0a10;flex-shrink:0;position:relative;}
.doc-menu-btn{height:26px;padding:0 10px;border-radius:7px;border:1px solid #2a2a3a;background:#15151f;color:#e6e6f0;font-size:12.5px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;}
.doc-menu-btn:hover{border-color:#3a3a52;}
.doc-new{height:26px;padding:0 10px;border-radius:7px;border:1px solid #2a2a3a;background:transparent;color:#9a9ab0;font-size:12px;cursor:pointer;}
.doc-new:hover{border-color:#60a5fa;color:#60a5fa;}
.doc-created{font-size:11px;color:#5a5a72;margin-left:auto;white-space:nowrap;}
.doc-list{display:none;position:absolute;top:40px;left:10px;width:300px;max-height:60vh;overflow-y:auto;background:#14141f;border:1px solid #2e2e3e;border-radius:10px;box-shadow:0 12px 34px rgba(0,0,0,.6);z-index:9000;padding:5px;}
.doc-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;cursor:pointer;font-size:12.5px;color:#c8c8da;}
.doc-row:hover{background:#1d1d2a;}.doc-row.on{background:#1e3a5f;}
.doc-ic{color:#fbbf24;width:14px;text-align:center;}
.doc-rn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.doc-dt{font-size:10px;color:#6a6a82;font-family:monospace;}
.doc-ren,.doc-del{opacity:0;border:none;background:transparent;color:#888;font-size:13px;cursor:pointer;padding:0 2px;}
.doc-row:hover .doc-ren,.doc-row:hover .doc-del{opacity:1;}.doc-del:hover{color:#f87171;}
.timelog{display:none;align-items:center;gap:5px;flex-wrap:wrap;padding:6px 10px;border-bottom:1px solid #1f1f2e;background:#0c0c12;flex-shrink:0;max-height:84px;overflow-y:auto;}
.tl-label{font-size:9px;text-transform:uppercase;letter-spacing:.07em;color:#5a5a72;font-weight:700;margin-right:3px;}
.tl-chip{height:20px;padding:0 8px;border-radius:999px;border:1px solid #2a3a5a;background:#10141f;color:#8fb4e8;font-size:10.5px;font-family:monospace;cursor:pointer;}
.tl-chip:hover{background:#16223a;color:#bcd4f5;}
.card-area{flex:1;min-height:0;overflow-y:auto;padding:16px;}
.cardmaker{max-width:640px;margin:0 auto;}
.cm-form{display:flex;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.cm-form input{flex:1;min-width:140px;height:36px;background:#111;border:1px solid #2a2a3a;border-radius:8px;color:#e0e0e0;padding:0 11px;font-size:13px;outline:none;}
.cm-form input:focus{border-color:#2b5a8f;}
.cm-form button{height:36px;padding:0 16px;border-radius:8px;border:1px solid #2563eb;background:#2563eb;color:#fff;font-size:13px;cursor:pointer;}
.cm-count{font-size:11px;color:#5a5a72;margin:4px 2px 12px;}
.cm-list{display:flex;flex-direction:column;gap:8px;}
.cm-card{display:flex;align-items:stretch;gap:8px;background:#13131c;border:1px solid #23232f;border-radius:9px;padding:11px 13px;}
.cm-c-main{flex:1;min-width:0;}
.cm-front{font-weight:600;color:#e6e6f0;font-size:14px;}
.cm-back{color:#9a9ab0;font-size:13px;margin-top:3px;}
.cm-dt{font-size:10px;color:#5a5a72;font-family:monospace;margin-top:6px;}
.cm-del{border:none;background:transparent;color:#777;font-size:16px;cursor:pointer;}.cm-del:hover{color:#f87171;}
.cm-empty{color:#454552;font-size:13px;padding:18px;text-align:center;}

.mode-icons{margin-left:auto;display:flex;gap:5px;}
.mode-ic{width:34px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;border:1px solid transparent;background:transparent;color:#7a7a92;cursor:pointer;}
.mode-ic:hover{background:#1a1a26;color:#bbb;}
.mode-ic.on{background:#1e3a5f;color:#60a5fa;border-color:#2b5a8f;}
.note-sel{display:flex;align-items:center;gap:4px;flex-shrink:0;position:relative;}
.note-sel .ns-ic{color:#fbbf24;display:flex;align-items:center;}
.note-sel input{height:26px;width:118px;background:#111;border:1px solid #2a2a3a;border-radius:6px;color:#e6e6f0;padding:0 8px;font-size:12.5px;outline:none;}
.note-sel input:focus,.card-head input:focus{border-color:#2b5a8f;}
.ns-dd,.ns-add{width:24px;height:26px;border-radius:6px;border:1px solid #2a2a3a;background:#15151f;color:#9a9ab0;cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ns-dd:hover,.ns-add:hover{border-color:#60a5fa;color:#60a5fa;}
.note-dropdown{display:none;position:absolute;top:32px;left:0;width:280px;max-height:50vh;overflow-y:auto;background:#14141f;border:1px solid #2e2e3e;border-radius:10px;box-shadow:0 12px 34px rgba(0,0,0,.6);z-index:9000;padding:5px;}
.nd-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;cursor:pointer;font-size:12.5px;color:#c8c8da;}
.nd-row:hover{background:#1d1d2a;}.nd-row.on{background:#1e3a5f;}
.nd-rn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nd-dt{font-size:10px;color:#6a6a82;font-family:monospace;}
.nd-del{opacity:0;border:none;background:transparent;color:#888;font-size:13px;cursor:pointer;}
.nd-row:hover .nd-del{opacity:1;}.nd-del:hover{color:#f87171;}
.nd-empty{color:#454552;font-size:12px;padding:10px;}
.card-head{display:flex;align-items:center;gap:4px;position:relative;max-width:640px;margin:0 auto 14px;}
.card-head .ns-ic{color:#fbbf24;display:flex;align-items:center;}
.card-head input{height:28px;width:170px;background:#111;border:1px solid #2a2a3a;border-radius:6px;color:#e6e6f0;padding:0 9px;font-size:13px;outline:none;}
</style>
</head>
<body>
<div class="app">
  <div class="title"><span class="b1">yt</span><span class="b2">notes</span><div class="mode-icons"><button class="mode-ic on" id="mi-note" title="Notes"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><path d="M9 12h6M9 16h5"/></svg></button><button class="mode-ic" id="mi-card" title="Flashcards"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="13" height="11" rx="2"/><path d="M8 7V6a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-1"/></svg></button></div></div>
  <div class="row" id="row">
    <div class="lib-pane" id="lib-pane">
      <div class="lib-head">Library<button id="lib-add-btn" title="Save current video">+</button></div>
      <div class="lib-list" id="lib-list"></div>
    </div>
    <div class="resizer" id="rz-lib"></div>
    <div class="pane pane-yt" id="pane-yt">
      <div class="yt-bar">
        <input id="yt-input" placeholder="Paste a YouTube link, video ID, or playlist…" autocomplete="off"/>
        <button id="yt-load">Load</button>
      </div>
      <div class="yt-wrap"><div id="player"><div class="yt-empty">Paste a YouTube URL above to load the player.</div></div></div>
    </div>
    <div class="resizer" id="rz-mid"></div>
    <div class="pane pane-note" id="pane-note">
      <div class="note-area" id="note-area">
      <div class="note-tb-wrap">
        <div class="note-sel">
          <span class="ns-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 3h9l4 4v14H6z"/><path d="M15 3v4h4"/><path d="M9 12h6M9 16h5"/></svg></span>
          <input id="note-name" value="note1" autocomplete="off"/>
          <button class="ns-dd" id="note-dd" title="Switch note">▾</button>
          <button class="ns-add" id="note-add" title="New note">+</button>
          <div class="note-dropdown" id="note-dropdown"></div>
        </div>
        <div class="tsep"></div>
        <div class="mode-bar" id="mode-bar">
          <button class="mbtn on" data-mode="text" title="Write"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6V5h14v1"/><path d="M12 5v14"/><path d="M9 19h6"/></svg></button>
          <button class="mbtn" data-mode="pen" title="Pen"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l3.5-1L18 8.5 15.5 6 4 17.5z"/><path d="M14.5 5.5l2-2 2.5 2.5-2 2z"/></svg></button>
          <button class="mbtn" data-mode="hi" title="Highlighter"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21h16"/><path d="M6 17l7.5-7.5 4 4L10 21H6z"/><path d="M13 8l3-3 3 3-3 3z"/></svg></button>
          <button class="mbtn" data-mode="eraser" title="Eraser"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h11"/><path d="M5 15l6-6 7 7-4 4H8z"/></svg></button>
        </div>
        <div class="tsep"></div>
        <div class="toolbar" id="note-tb"></div>
        <div class="inkbar" id="inkbar">
          <button id="ink-color" class="ink-color-btn" title="Ink colour"><span class="icb-sw"></span></button>
          <div class="sizewrap"><input type="range" id="ink-size" min="1" max="40" value="3"/><span id="ink-sizeval">3</span></div>
          <button class="mbtn" id="ink-clear" title="Clear all ink"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
        </div>
      </div>
      <div class="timelog" id="timelog"></div>
      <div class="note-body" id="note-body">
        <div class="note-scroll" id="note-scroll">
          <div id="note-valign" class="editor-valign-wrap valign-top">
            <div id="note-ed" class="editor" contenteditable="true" spellcheck="true"></div>
          </div>
        </div>
        <canvas id="ink"></canvas>
      </div>
      </div>
      <div class="card-area" id="card-area" style="display:none"></div>
    </div>
  </div>
</div>
<span id="note-status" style="display:none"></span>

function inkScroll(){return noteScroll?noteScroll.scrollTop:0;}

function drawStroke(s){const pts=s.pts;if(!pts||!pts.length)return;ctx.save();ctx.lineCap='round';ctx.lineJoin='round';if(s.tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=s.size*1.6;}else if(s.tool==='hi'){ctx.globalCompositeOperation='source-over';ctx.globalAlpha=.32;ctx.strokeStyle=s.color;ctx.lineWidth=s.size*4;}else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=s.color;ctx.lineWidth=s.size;}ctx.beginPath();const sc=inkScroll();for(let i=0;i<pts.length;i++){const X=pts[i].xn*inkW,Y=pts[i].yn*inkW-sc;if(i===0)ctx.moveTo(X,Y);else ctx.lineTo(X,Y);}if(pts.length===1){const X=pts[0].xn*inkW,Y=pts[0].yn*inkW-sc;ctx.lineTo(X+0.01,Y+0.01);}ctx.stroke();ctx.restore();}

function initInk(){inkBody=document.getElementById('note-body');noteScroll=document.getElementById('note-scroll');cv=document.getElementById('ink');ctx=cv.getContext('2d');sizeCanvas();

function renderTimelog(){const el=document.getElementById('timelog');if(!el)return;const log=(curDoc&&curDoc.timelog)||[];if(!log.length){el.style.display='none';el.innerHTML='';return;}el.style.display='flex';el.innerHTML='<span class="tl-label">video log</span>'+log.slice(-50).map(e=>'<button class="tl-chip" data-vt="'+e.vt+'">'+fmtVt(e.vt)+'</button>').join('');el.querySelectorAll('.tl-chip').forEach(b=>b.onclick=()=>{try{if(ytPlayer&&ytPlayer.seekTo){ytPlayer.seekTo(+b.dataset.vt,true);ytPlayer.playVideo&&ytPlayer.playVideo();}}catch(e){}});}
function renderCards(){const area=document.getElementById('card-area');if(!area)return;const m=curMeta();const cards=(curDoc&&curDoc.cards)||[];
  area.innerHTML='<div class="card-head"><span class="ns-ic"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="7" width="13" height="11" rx="2"/><path d="M8 7V6a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-1"/></svg></span><input id="card-name" value="'+esc2(m?m.name:'')+'" autocomplete="off"/><button class="ns-dd" id="card-dd" title="Switch set">\u25be</button><button class="ns-add" id="card-add" title="New set">+</button><div class="note-dropdown" id="card-dropdown"></div></div><div class="cardmaker"><div class="cm-form"><input id="cm-front" placeholder="Front\u2026" autocomplete="off"/><input id="cm-back" placeholder="Back\u2026" autocomplete="off"/><button id="cm-add">Add card</button></div><div class="cm-count">'+cards.length+' card'+(cards.length===1?'':'s')+'</div><div class="cm-list" id="cm-list"></div></div>';
  const list=area.querySelector('#cm-list');
  list.innerHTML=cards.length?cards.map((c,i)=>'<div class="cm-card"><div class="cm-c-main"><div class="cm-front">'+esc2(c.front)+'</div><div class="cm-back">'+esc2(c.back)+'</div><div class="cm-dt">'+fmtDate(c.created)+'</div></div><button class="cm-del" data-i="'+i+'" title="Delete">\u00d7</button></div>').join(''):'<div class="cm-empty">No cards yet \u2014 add your first above.</div>';
  const add=()=>{const f=area.querySelector('#cm-front'),b=area.querySelector('#cm-back');if(!f.value.trim()&&!b.value.trim())return;curDoc.cards=curDoc.cards||[];curDoc.cards.push({front:f.value.trim(),back:b.value.trim(),created:Date.now()});persistCur();renderCards();const nf=document.querySelector('#cm-front');if(nf)nf.focus();};
  area.querySelector('#cm-add').onclick=add;area.querySelector('#cm-back').addEventListener('keydown',e=>{if(e.key==='Enter')add();});area.querySelector('#cm-front').addEventListener('keydown',e=>{if(e.key==='Enter')area.querySelector('#cm-back').focus();});
  list.querySelectorAll('.cm-del').forEach(x=>x.onclick=()=>{curDoc.cards.splice(+x.dataset.i,1);persistCur();renderCards();});
  const cn=area.querySelector('#card-name');cn.addEventListener('change',()=>{const mm=curMeta();if(mm&&mm.type==='flashcard'){mm.name=(cn.value.trim()||mm.name);cn.value=mm.name;saveDocs();}});cn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();cn.blur();}});
  area.querySelector('#card-dd').onclick=()=>{const dd=area.querySelector('#card-dropdown');dd.style.display=dd.style.display==='block'?'none':'block';renderCardDropdown();};
  area.querySelector('#card-add').onclick=()=>newDoc('flashcard');renderCardDropdown();}
function renderCardDropdown(){const dd=document.getElementById('card-dropdown');if(!dd)return;const cs=cardsList();dd.innerHTML=cs.length?cs.map(d=>'<div class="nd-row'+(d.id===CURID?' on':'')+'" data-id="'+d.id+'"><span class="nd-rn">'+esc2(d.name)+'</span><span class="nd-dt">'+fmtDate(d.created)+'</span><button class="nd-del" data-del="'+d.id+'" title="Delete">\u00d7</button></div>').join(''):'<div class="nd-empty">No sets yet</div>';dd.querySelectorAll('.nd-row').forEach(r=>r.onclick=e=>{if(e.target.dataset.del){deleteDoc(e.target.dataset.del);renderCardDropdown();return;}openDoc(r.dataset.id);dd.style.display='none';});}
function renderLibrary(){const list=document.getElementById('lib-list');if(!list)return;list.innerHTML=VIDEOS.length?VIDEOS.map((v,i)=>'<div class="lib-item" data-i="'+i+'"><span class="lib-name">'+esc2(v.name)+'</span><button class="lib-del" data-d="'+i+'" title="Remove">\u00d7</button></div>').join(''):'<div class="lib-empty">No saved videos. Load one, then tap +.</div>';
  list.querySelectorAll('.lib-item').forEach(it=>it.onclick=e=>{if(e.target.dataset.d){VIDEOS.splice(+e.target.dataset.d,1);idbSet('videos',VIDEOS);renderLibrary();return;}const v=VIDEOS[+it.dataset.i];const inp=document.getElementById('yt-input');inp.value=v.url;loadVideo(v.url);});
  const ab=document.getElementById('lib-add-btn');if(ab)ab.onclick=addCurrentVideo;}
function addCurrentVideo(){const url=(document.getElementById('yt-input').value||'').trim();if(!url){alert('Load or paste a video first.');return;}const name=prompt('Name this video:','ytvid'+(VIDEOS.length+1));if(name==null)return;VIDEOS.unshift({name:(name.trim()||url),url,created:Date.now()});idbSet('videos',VIDEOS);renderLibrary();}

/* ---------- boot ---------- */
(async function(){
  await DB_loadColors();
  editor=makeEditor('note-ed','note-tb','note-status','note-valign');
  window.editor=editor;
  initInk();
  await loadAll();
  buildDocUI();
  renderLibrary();
  curNoteId=await idbGet('curNote');curCardId=await idbGet('curCard');viewMode=(await idbGet('view'))||'note';
  if(!notesList().find(d=>d.id===curNoteId))curNoteId=(notesList()[0]||{}).id;
  if(!cardsList().find(d=>d.id===curCardId))curCardId=(cardsList()[0]||{}).id;
  setView(viewMode);
  setInterval(noteTick,1200);
  window.addEventListener('beforeunload',()=>{persistCur();});
  const libW=await idbGet('libW');if(typeof libW==='number')document.getElementById('lib-pane').style.width=libW+'px';
  const ytW=await idbGet('ytW');if(typeof ytW==='number'){const py=document.getElementById('pane-yt');py.style.flex='0 0 auto';py.style.width=ytW+'px';}
  makeResizer('rz-lib',document.getElementById('lib-pane'),'libW',120,520);
  makeResizer('rz-mid',document.getElementById('pane-yt'),'ytW',180,3000);
  const vInput=document.getElementById('yt-input');
  const vid=await idbGet('video');if(typeof vid==='string'&&vid){vInput.value=vid;pendingVideo=vid;ensureYT();}
  document.getElementById('yt-load').addEventListener('click',()=>loadVideo(vInput.value));
  vInput.addEventListener('keydown',e=>{if(e.key==='Enter')loadVideo(vInput.value);});
  if(typeof sizeCanvas==='function')setTimeout(sizeCanvas,60);
})();
</script>
