<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>YT Notes</title>
<style>
*{box-sizing:border-box;}
html,body{margin:0;height:100%;}
body{background:#0c0c12;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.app{display:flex;flex-direction:column;width:100vw;height:100vh;overflow:hidden;}
.title{height:3em;display:flex;align-items:center;gap:6px;padding:0 16px;border-bottom:1px solid #1f1f2e;background:#0a0a10;flex-shrink:0;font-weight:800;letter-spacing:-.01em;font-size:16px;}
.title .b1{color:#fbbf24;} .title .b2{color:#e6e6f0;}
.title .sub{margin-left:auto;font-weight:500;font-size:11px;color:#5a5a72;}
.row{flex:1;display:flex;min-height:0;}
.pane{display:flex;flex-direction:column;min-width:0;min-height:0;}
.pane-yt{width:50%;}
.pane-note{flex:1;}
.resizer{width:7px;cursor:col-resize;background:#13131c;flex-shrink:0;border-left:1px solid #1f1f2e;border-right:1px solid #1f1f2e;transition:background .12s;touch-action:none;}
.resizer:hover,.resizer.drag{background:#2b5a8f;}
/* YT pane */
.yt-bar{display:flex;gap:8px;padding:8px;border-bottom:1px solid #1f1f2e;flex-shrink:0;background:#0c0c12;}
.yt-bar input{flex:1;min-width:0;height:32px;background:#111;border:1px solid #2a2a3a;border-radius:7px;color:#e0e0e0;padding:0 10px;font-size:13px;outline:none;}
.yt-bar input:focus{border-color:#2b5a8f;}
.yt-bar button{height:32px;padding:0 15px;border-radius:7px;border:1px solid #2563eb;background:#2563eb;color:#fff;font-size:13px;cursor:pointer;flex-shrink:0;}
.yt-bar button:hover{background:#1d4ed8;}
.yt-wrap{flex:1;min-height:0;background:#000;display:flex;align-items:center;justify-content:center;position:relative;}
#player,#player iframe{width:100%;height:100%;border:0;}
.yt-empty{color:#454552;font-size:13px;text-align:center;padding:20px;}
/* note pane */
.note-tb-wrap{border-bottom:1px solid #1f1f2e;background:#0c0c12;flex-shrink:0;padding:6px 8px;overflow-x:auto;scrollbar-width:none;min-height:42px;display:flex;align-items:center;}
.note-tb-wrap::-webkit-scrollbar{display:none;}
.note-scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;}
/* ---- editor (ported from Patchwork) ---- */
.toolbar{display:flex;align-items:center;gap:3px;flex-wrap:nowrap;}
.tbtn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;color:#bbb;border:none;background:transparent;font-size:12px;font-weight:500;flex-shrink:0;user-select:none;transition:background .1s;}
.tbtn:hover{background:#23232f;}
.tbtn.on{background:#1e3a5f;color:#60a5fa;}
.tsep{width:1px;height:16px;background:#2a2a3a;margin:0 1px;flex-shrink:0;}
.toolbar select,.toolbar input[type="number"]{height:24px;font-size:11px;padding:0 3px;border:1px solid #2a2a3a;border-radius:5px;background:#111;color:#bbb;}
.toolbar select{max-width:120px;}
.toolbar input[type="number"]{width:40px;text-align:center;}
.color-btn{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;width:26px;height:26px;border-radius:5px;cursor:pointer;user-select:none;flex-shrink:0;transition:background .1s;}
.color-btn:hover{background:#23232f;}
.color-btn.on{background:#1e3a5f;}
.color-btn .cletter{font-size:12px;font-weight:600;line-height:1;color:#bbb;}
.color-btn .cbar{height:3px;width:16px;border-radius:2px;margin-top:2px;transition:background .15s;}
.img-resize-group{display:none;align-items:center;gap:5px;border:1px solid #3a5a3a;border-radius:7px;padding:2px 6px;height:26px;background:#161e16;}
.img-resize-group.visible{display:flex;}
.img-resize-group .resize-label{font-size:10px;color:#7dba7d;white-space:nowrap;user-select:none;}
.img-resize-group input[type="range"]{width:64px;height:4px;accent-color:#4caf50;cursor:pointer;}
.img-resize-group .resize-val{font-size:10px;color:#7dba7d;min-width:30px;text-align:right;font-family:monospace;}
.editor-valign-wrap{position:static;display:block;overflow:visible;}
.valign-top{}.valign-middle{}.valign-bottom{}
.editor{outline:none;font-size:15px;line-height:1.75;color:#e0e0e0;cursor:text;caret-color:#e0e0e0;padding:20px 24px 35vh 24px;min-height:60vh;}
.line{min-height:1.75em;white-space:pre-wrap;word-break:break-word;}
.img-run{display:inline-block;vertical-align:middle;position:relative;}
.img-run.img-selected img{outline:2px solid #4caf50;border-radius:2px;}
.editor img{max-width:100%;height:auto;border-radius:4px;}
/* color popover */
.color-pop{position:fixed;z-index:10000;background:#1c1c28;border:1px solid #3a3a4a;border-radius:10px;padding:10px;box-shadow:0 8px 28px rgba(0,0,0,.5);width:196px;display:none;}
.color-pop.open{display:block;}
.color-pop .cp-row{display:flex;align-items:center;gap:7px;width:100%;background:transparent;border:none;color:#c0c0d8;font-size:12px;font-family:inherit;cursor:pointer;padding:6px;border-radius:6px;text-align:left;}
.color-pop .cp-row:hover{background:#262635;}
.color-pop .cp-label{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#5a5a72;margin:9px 2px 5px;}
.color-pop .cp-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;}
.color-pop .cp-fav-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;}
.color-pop .cp-sw{width:100%;aspect-ratio:1;border-radius:4px;border:1px solid rgba(255,255,255,.12);cursor:pointer;position:relative;transition:transform .08s,border-color .1s;padding:0;}
.color-pop .cp-sw:hover{transform:scale(1.14);border-color:rgba(255,255,255,.45);z-index:1;}
.color-pop .cp-fav{width:100%;aspect-ratio:1;border-radius:5px;border:1px solid rgba(255,255,255,.18);cursor:pointer;position:relative;transition:transform .08s;padding:0;}
.color-pop .cp-fav:hover{transform:scale(1.1);}
.color-pop .cp-fav .cp-x{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:#2a2a3a;border:1px solid #4a4a5a;color:#ddd;font-size:10px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;}
.color-pop .cp-fav:hover .cp-x{display:flex;}
.color-pop .cp-fav-add{width:100%;aspect-ratio:1;border-radius:5px;border:1px dashed #4a4a5a;background:transparent;color:#7a7a92;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;position:relative;padding:0;}
.color-pop .cp-fav-add:hover{border-color:#60a5fa;color:#60a5fa;}
.color-pop .cp-divider{height:1px;background:#2a2a38;margin:9px 0;}
.color-pop .cp-current{position:relative;}
.color-pop .cp-current .cp-cur-sw{width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.25);flex-shrink:0;}
.color-pop .cp-current span:nth-child(2){flex:1;}
.color-pop .cp-current .cp-cur-hex{font-family:monospace;font-size:10px;color:#7a7a92;}
.color-pop .cp-star{position:absolute;top:-5px;right:-5px;width:14px;height:14px;border-radius:50%;background:#2a2a3a;border:1px solid #4a4a5a;color:#fbbf24;font-size:8px;line-height:1;display:none;align-items:center;justify-content:center;cursor:pointer;}
.color-pop .cp-fav:hover .cp-star{display:flex;}
@media(max-width:640px){.row{flex-direction:column;}.pane-yt{width:100%!important;height:45%;}.resizer{display:none;}.pane-note{flex:1;}}

.mode-bar{display:flex;align-items:center;gap:2px;flex-shrink:0;}
.mbtn{width:28px;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:5px;color:#bbb;border:none;background:transparent;flex-shrink:0;transition:background .1s;}
.mbtn:hover{background:#23232f;}
.mbtn.on{background:#1e3a5f;color:#60a5fa;}
.inkbar{display:none;align-items:center;gap:9px;}
.ink-color-btn{display:inline-flex;align-items:center;height:26px;padding:0 7px;border-radius:6px;border:1px solid #2a2a3a;background:#15151f;cursor:pointer;flex-shrink:0;}
.ink-color-btn:hover{border-color:#3a3a52;}
.ink-color-btn .icb-sw{width:16px;height:16px;border-radius:4px;border:1px solid rgba(255,255,255,.28);background:#fff;}
.sizewrap{display:flex;align-items:center;gap:6px;color:#888;font-size:11px;}
.sizewrap input[type=range]{width:80px;accent-color:#60a5fa;cursor:pointer;}
.note-body{position:relative;flex:1;min-height:0;}
.note-scroll{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;}
#ink{position:absolute;inset:0;z-index:5;pointer-events:none;touch-action:none;}
</style>
</head>
<body>
<div class="app">
  <div class="title"><span class="b1">yt</span><span class="b2">notes</span><span class="sub">player + notes</span></div>
  <div class="row" id="row">
    <div class="pane pane-yt" id="pane-yt">
      <div class="yt-bar">
        <input id="yt-input" placeholder="Paste a YouTube link, video ID, or playlist…" autocomplete="off"/>
        <button id="yt-load">Load</button>
      </div>
      <div class="yt-wrap"><div id="player"><div class="yt-empty">Paste a YouTube URL above to load the player.</div></div></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="pane pane-note" id="pane-note">
      <div class="note-tb-wrap">
        <div class="mode-bar" id="mode-bar">
          <button class="mbtn on" data-mode="text" title="Write"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 6V5h14v1"/><path d="M12 5v14"/><path d="M9 19h6"/></svg></button>
          <button class="mbtn" data-mode="pen" title="Pen"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21l3.5-1L18 8.5 15.5 6 4 17.5z"/><path d="M14.5 5.5l2-2 2.5 2.5-2 2z"/></svg></button>
          <button class="mbtn" data-mode="hi" title="Highlighter"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 21h16"/><path d="M6 17l7.5-7.5 4 4L10 21H6z"/><path d="M13 8l3-3 3 3-3 3z"/></svg></button>
          <button class="mbtn" data-mode="eraser" title="Eraser"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 21h11"/><path d="M5 15l6-6 7 7-4 4H8z"/></svg></button>
        </div>
        <div class="tsep"></div>
        <div class="toolbar" id="note-tb"></div>
        <div class="inkbar" id="inkbar">
          <button id="ink-color" class="ink-color-btn" title="Ink colour"><span class="icb-sw"></span></button>
          <div class="sizewrap"><input type="range" id="ink-size" min="1" max="40" value="3"/><span id="ink-sizeval">3</span></div>
          <button class="mbtn" id="ink-clear" title="Clear all ink"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
        </div>
      </div>
      <div class="note-body" id="note-body">
        <div class="note-scroll" id="note-scroll">
          <div id="note-valign" class="editor-valign-wrap valign-top">
            <div id="note-ed" class="editor" contenteditable="true" spellcheck="true"></div>
          </div>
        </div>
        <canvas id="ink"></canvas>
      </div>
    </div>
  </div>
</div>
<span id="note-status" style="display:none"></span>
<script>
/* ---------- tiny IndexedDB key-value (works on GitHub Pages; degrades gracefully) ---------- */
let _idb=null;
function idbOpen(){return new Promise((res,rej)=>{try{const r=indexedDB.open('ytnotes',1);r.onupgradeneeded=()=>{try{r.result.createObjectStore('kv');}catch(e){}};r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}catch(e){rej(e);}});}
async function idbGet(k){try{if(!_idb)_idb=await idbOpen();return await new Promise((res,rej)=>{const t=_idb.transaction('kv','readonly').objectStore('kv').get(k);t.onsuccess=()=>res(t.result);t.onerror=()=>rej(t.error);});}catch(e){return undefined;}}
async function idbSet(k,v){try{if(!_idb)_idb=await idbOpen();return await new Promise((res,rej)=>{const t=_idb.transaction('kv','readwrite').objectStore('kv').put(v,k);t.onsuccess=()=>res();t.onerror=()=>rej(t.error);});}catch(e){}}

/* ---------- globals the editor expects ---------- */
const DEFAULT_TEXT_COLOR='#e0e0e0';
function getMarkStyle(){return null;}
const DOMPurify={sanitize:(html)=>{try{const t=document.createElement('template');t.innerHTML=String(html||'');t.content.querySelectorAll('script,style,iframe,object,embed,link,meta').forEach(n=>n.remove());t.content.querySelectorAll('*').forEach(el=>{[...el.attributes].forEach(a=>{if(/^on/i.test(a.name)||/^(href|src)$/i.test(a.name)&&/^\s*javascript:/i.test(a.value))el.removeAttribute(a.name);});});return t.innerHTML;}catch(e){return '';}}};
/* ---- doodle / paint modal (ported from Patchwork) ---- */
let _draw=null;
function openDrawModal(onInsert){const st=_ensureDrawModal();st.onInsert=onInsert;st.strokes=[];st.active=null;st.drawing=false;st.tool="pen";st.bg="paper";st.canvas.className="bg-paper";_drawBuildSwatches();_drawUpdateUI();st.modal.style.display="flex";st.modal.focus();requestAnimationFrame(()=>{_drawResize();_drawRedraw();});}
function _ensureDrawModal(){
  if(_draw)return _draw;
  const css=document.createElement("style");
  css.textContent=`.draw-modal{position:fixed;inset:0;z-index:10500;background:rgba(0,0,0,.62);display:flex;align-items:center;justify-content:center;}.draw-dialog{width:min(900px,95vw);height:min(660px,93vh);background:#161616;border:1px solid #2a2a2a;border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 24px 70px rgba(0,0,0,.55);}.draw-head{display:flex;align-items:center;gap:8px;padding:8px 10px;border-bottom:1px solid #2a2a2a;flex-wrap:wrap;}.draw-head .dh-title{font-size:13px;color:#c0c0d8;font-weight:600;margin-right:2px;}.draw-tool{width:30px;height:30px;border-radius:7px;border:1px solid #2a2a2a;background:#1e1e1e;color:#bbb;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}.draw-tool:hover{background:#2a2a2a;}.draw-tool.on{background:#1e3a5f;border-color:#2b5a8f;color:#60a5fa;}.draw-sep{width:1px;height:22px;background:#2a2a2a;flex-shrink:0;}.draw-size{display:flex;align-items:center;gap:6px;color:#888;font-size:11px;}.draw-size input[type=range]{width:84px;}.draw-size .sz-val{min-width:18px;text-align:right;color:#aaa;}.draw-colors{display:flex;align-items:center;gap:4px;flex-wrap:wrap;max-width:300px;}.draw-sw{width:18px;height:18px;border-radius:4px;border:1px solid rgba(255,255,255,.22);cursor:pointer;}.draw-sw.on{outline:2px solid #fff;outline-offset:1px;}.draw-pick{width:26px;height:26px;border:1px solid #3a3a4a;border-radius:5px;background:#111;cursor:pointer;padding:1px;}.draw-actions{margin-left:auto;display:flex;gap:8px;}.draw-btn{height:30px;padding:0 14px;border-radius:7px;border:1px solid #2a2a2a;background:#1e1e1e;color:#c0c0d8;font-size:12px;cursor:pointer;}.draw-btn:hover{background:#2a2a2a;}.draw-btn.primary{background:#2563eb;border-color:#2563eb;color:#fff;}.draw-btn.primary:hover{background:#1d4ed8;}.draw-btn:disabled{opacity:.4;cursor:not-allowed;}.draw-surface{flex:1;min-height:0;position:relative;display:flex;align-items:center;justify-content:center;padding:12px;background:#0d0d0d;}#draw-canvas{border-radius:8px;box-shadow:0 0 0 1px #2a2a2a;touch-action:none;cursor:crosshair;}#draw-canvas.bg-paper{background:#fcfcf7;}#draw-canvas.bg-transparent{background-color:#2a2a2a;background-image:linear-gradient(45deg,#222 25%,transparent 25%),linear-gradient(-45deg,#222 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#222 75%),linear-gradient(-45deg,transparent 75%,#222 75%);background-size:16px 16px;background-position:0 0,0 8px,8px -8px,-8px 0;}`;
  document.head.appendChild(css);
  const PEN='<svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>';
  const ERASER='<svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20H8.5L3.4 14.9a1.9 1.9 0 0 1 0-2.7l7.6-7.6a1.9 1.9 0 0 1 2.7 0l5.9 5.9a1.9 1.9 0 0 1 0 2.7L13 20"/><path d="M8.5 9.5l6 6"/></svg>';
  const UNDO='<svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"/><path d="M3.5 13a9 9 0 1 0 2.6-7.6L3 8"/></svg>';
  const CLEAR='<svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg>';
  const BG='<svg viewBox="0 0 24 24" width="15" height="15" stroke="currentColor" stroke-width="2" fill="none"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 9v12" opacity=".7"/></svg>';
  const modal=document.createElement("div");modal.className="draw-modal";modal.style.display="none";
  modal.innerHTML='<div class="draw-dialog"><div class="draw-head"><span class="dh-title">Draw</span><div class="draw-tool on" data-tool="pen" title="Pen">'+PEN+'</div><div class="draw-tool" data-tool="eraser" title="Eraser">'+ERASER+'</div><div class="draw-sep"></div><div class="draw-size"><span>Size</span><input type="range" min="1" max="48" value="4"><span class="sz-val">4</span></div><div class="draw-sep"></div><div class="draw-tool" data-act="undo" title="Undo (Ctrl+Z)">'+UNDO+'</div><div class="draw-tool" data-act="clear" title="Clear all">'+CLEAR+'</div><div class="draw-sep"></div><div class="draw-tool" data-act="bg" title="Toggle paper / transparent">'+BG+'</div><div class="draw-sep"></div><div class="draw-colors"></div><input type="color" class="draw-pick" title="Custom color" value="#1a1a1a"><div class="draw-actions"><button class="draw-btn" data-act="cancel">Cancel</button><button class="draw-btn primary" data-act="insert">Insert</button></div></div><div class="draw-surface"><canvas id="draw-canvas" class="bg-paper"></canvas></div></div>';
  document.body.appendChild(modal);
  const canvas=modal.querySelector("#draw-canvas");
  _draw={modal,canvas,ctx:canvas.getContext("2d"),dpr:Math.max(1,Math.min(3,window.devicePixelRatio||1)),strokes:[],active:null,drawing:false,tool:"pen",penColor:"#1a1a1a",penSize:4,eraserSize:24,bg:"paper",onInsert:null};
  modal.querySelector(".draw-pick").oninput=function(){_drawSetColor(this.value);};
  modal.querySelectorAll(".draw-tool[data-tool]").forEach(b=>b.onclick=()=>{_draw.tool=b.dataset.tool;_drawUpdateUI();});
  modal.querySelector('[data-act="undo"]').onclick=_drawUndo;
  modal.querySelector('[data-act="clear"]').onclick=()=>{_draw.strokes=[];_drawRedraw();_drawUpdateUI();};
  modal.querySelector('[data-act="bg"]').onclick=()=>{_draw.bg=_draw.bg==="paper"?"transparent":"paper";canvas.className="bg-"+_draw.bg;};
  modal.querySelector('[data-act="cancel"]').onclick=_drawClose;
  modal.querySelector('[data-act="insert"]').onclick=_drawInsert;
  modal.addEventListener("mousedown",e=>{if(e.target===modal)_drawClose();});
  const slider=modal.querySelector(".draw-size input");
  slider.oninput=()=>{const v=Number(slider.value);if(_draw.tool==="eraser")_draw.eraserSize=v;else _draw.penSize=v;modal.querySelector(".sz-val").textContent=v;};
  const toPt=e=>{const r=canvas.getBoundingClientRect();const eff=e.pressure>0&&e.pressure<1?e.pressure:0.5;const base=_draw.tool==="eraser"?_draw.eraserSize:_draw.penSize;return{nx:(e.clientX-r.left)/r.width,ny:(e.clientY-r.top)/r.height,w:base*(_draw.tool==="eraser"?1:(0.55+0.9*eff))};};
  canvas.addEventListener("pointerdown",e=>{e.preventDefault();canvas.setPointerCapture(e.pointerId);_draw.drawing=true;_draw.active={tool:_draw.tool,color:_draw.penColor,pts:[toPt(e)]};_draw.strokes.push(_draw.active);_drawDot(_draw.active);_drawUpdateUI();});
  canvas.addEventListener("pointermove",e=>{if(!_draw.drawing||!_draw.active)return;e.preventDefault();const p=toPt(e),pts=_draw.active.pts,prev=pts[pts.length-1];pts.push(p);_drawSeg(_draw.active,prev,p);});
  const end=()=>{_draw.drawing=false;_draw.active=null;};
  canvas.addEventListener("pointerup",end);canvas.addEventListener("pointercancel",end);canvas.addEventListener("pointerleave",end);
  modal.tabIndex=-1;
  document.addEventListener("keydown",e=>{if(modal.style.display==="none")return;if(e.key==="Escape"){e.preventDefault();_drawClose();}else if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()==="z"){e.preventDefault();_drawUndo();}});
  window.addEventListener("resize",()=>{if(modal.style.display!=="none"){_drawResize();_drawRedraw();}});

  requestAnimationFrame(()=>{placeCaret(0,0);updateTb();});
  function insertImage(src){insImgFitted(src,null);}
  function applyMark(id){readSel();if(!sel){if(typeof toast==="function")toast("Select some text first","info");return false;}pushUndo("mark");applyFmt("mark",id);delete fmt.mark;busy=true;renderAll();requestAnimationFrame(()=>{restoreSel();busy=false;updateTb();});if(typeof markDirty==="function")markDirty();return true;}
  function clearMarkRuns(id){let ch=false;for(const p of doc)for(const r of p.runs)if(r.type!=="image"&&r.mark===id){r.mark=null;ch=true;}if(ch){busy=true;renderAll();requestAnimationFrame(()=>{placeCaret(cur.p,cur.offset);busy=false;});if(typeof markDirty==="function")markDirty();}return ch;}
  function selText(){readSel();if(!sel)return"";const{sp,so,ep,eo}=sel;const out=[];for(let pi=sp;pi<=ep;pi++){const p=doc[pi],fr=pi===sp?so:0,to=pi===ep?eo:plen(p);out.push(rfr(p,fr,to).filter(r=>r.type==="text").map(r=>r.text).join(""));}return out.join(" ").trim();}
  function hasSelection(){readSel();return !!sel;}
  function refresh(){busy=true;renderAll();requestAnimationFrame(()=>{placeCaret(cur.p,cur.offset);busy=false;updateTb();});}
  function markEl(id){return ed.querySelector('[data-mark="'+id+'"]');}
  return{getHTML,setHTML,clear,getPlainText,insertImage,undo,redo,applyMark,clearMarkRuns,selText,hasSelection,refresh,markEl};
}

/* ---------- YouTube IFrame Player API ---------- */
let ytPlayer=null,ytReady=false,pendingVideo=null;
function parseYT(s){s=String(s||'').trim();let list=null,v=null;try{if(/^https?:/i.test(s)){const u=new URL(s);list=u.searchParams.get('list');v=u.searchParams.get('v');if(!v&&u.hostname.includes('youtu.be'))v=u.pathname.slice(1);if(!v&&u.pathname.includes('/shorts/'))v=u.pathname.split('/shorts/')[1];if(!v&&u.pathname.includes('/embed/'))v=u.pathname.split('/embed/')[1];}else if(/^[A-Za-z0-9_-]{11}$/.test(s)){v=s;}else if(/^(PL|UU|LL|FL|RD|OL)[A-Za-z0-9_-]+$/.test(s)){list=s;}}catch(e){if(/^[A-Za-z0-9_-]{11}$/.test(s))v=s;}if(v)v=v.split('&')[0].slice(0,11);return{v,list};}
function loadVideo(input){const {v,list}=parseYT(input);if(!v&&!list)return;idbSet('video',input);if(!ytReady||!ytPlayer){pendingVideo=input;ensureYT();return;}try{if(list)ytPlayer.loadPlaylist({list,listType:'playlist',index:0});else ytPlayer.loadVideoById(v);}catch(e){}}
function onYouTubeIframeAPIReady(){const host=document.getElementById('player');host.innerHTML='';ytPlayer=new YT.Player('player',{width:'100%',height:'100%',playerVars:{rel:0,modestbranding:1,playsinline:1},events:{onReady:()=>{ytReady=true;if(pendingVideo)loadVideo(pendingVideo);}}});}
let _ytTagged=false;
function ensureYT(){if(_ytTagged)return;_ytTagged=true;const tag=document.createElement('script');tag.src='https://www.youtube.com/iframe_api';document.head.appendChild(tag);}

/* ---------- resizable split ---------- */
(function(){
  const row=document.getElementById('row'),left=document.getElementById('pane-yt'),rz=document.getElementById('resizer');
  let dragging=false;
  function setPct(p){p=Math.max(15,Math.min(85,p));left.style.width=p+'%';}
  rz.addEventListener('pointerdown',e=>{dragging=true;rz.classList.add('drag');try{rz.setPointerCapture(e.pointerId);}catch(_){}e.preventDefault();});
  rz.addEventListener('pointermove',e=>{if(!dragging)return;const r=row.getBoundingClientRect();setPct(((e.clientX-r.left)/r.width)*100);});
  rz.addEventListener('pointerup',e=>{if(!dragging)return;dragging=false;rz.classList.remove('drag');try{rz.releasePointerCapture(e.pointerId);}catch(_){}const r=row.getBoundingClientRect();idbSet('split',(left.getBoundingClientRect().width/r.width)*100);});
  window._setSplit=setPct;
})();


/* ---------- freehand ink overlay (pen / highlighter / eraser), like Patchwork ---------- */
let mode='text',inkColor='#ffffff',inkSize=3,strokes=[],inkRedo=[];
let cv,ctx,inkBody,noteScroll,inkW=0,inkH=0,inkDpr=1,inkDrawing=false,curStroke=null,_strokeT=null;
function inkScroll(){return noteScroll?noteScroll.scrollTop:0;}
function inkPt(e){const r=inkBody.getBoundingClientRect();return{xn:(e.clientX-r.left)/inkW,yn:((e.clientY-r.top)+inkScroll())/inkW};}
function sizeCanvas(){if(!cv)return;inkW=inkBody.clientWidth;inkH=inkBody.clientHeight;inkDpr=Math.min(3,window.devicePixelRatio||1);cv.width=Math.round(inkW*inkDpr);cv.height=Math.round(inkH*inkDpr);cv.style.width=inkW+'px';cv.style.height=inkH+'px';redrawInk();}
function drawStroke(s){const pts=s.pts;if(!pts||!pts.length)return;ctx.save();ctx.lineCap='round';ctx.lineJoin='round';if(s.tool==='eraser'){ctx.globalCompositeOperation='destination-out';ctx.strokeStyle='rgba(0,0,0,1)';ctx.lineWidth=s.size*1.6;}else if(s.tool==='hi'){ctx.globalCompositeOperation='source-over';ctx.globalAlpha=.32;ctx.strokeStyle=s.color;ctx.lineWidth=s.size*4;}else{ctx.globalCompositeOperation='source-over';ctx.strokeStyle=s.color;ctx.lineWidth=s.size;}ctx.beginPath();const sc=inkScroll();for(let i=0;i<pts.length;i++){const X=pts[i].xn*inkW,Y=pts[i].yn*inkW-sc;if(i===0)ctx.moveTo(X,Y);else ctx.lineTo(X,Y);}if(pts.length===1){const X=pts[0].xn*inkW,Y=pts[0].yn*inkW-sc;ctx.lineTo(X+0.01,Y+0.01);}ctx.stroke();ctx.restore();}
function redrawInk(){if(!ctx)return;ctx.setTransform(inkDpr,0,0,inkDpr,0,0);ctx.clearRect(0,0,inkW,inkH);for(const s of strokes)drawStroke(s);if(inkDrawing&&curStroke)drawStroke(curStroke);}
function saveStrokes(){clearTimeout(_strokeT);_strokeT=setTimeout(()=>idbSet('strokes',strokes),400);}
function setInkColor(hex){hex=normalizeHex(hex)||hex;inkColor=hex;const sw=document.querySelector('#ink-color .icb-sw');if(sw)sw.style.background=hex;pushRecentColor(hex);}
function setMode(m){mode=m;document.querySelectorAll('#mode-bar .mbtn').forEach(b=>b.classList.toggle('on',b.dataset.mode===m));const draw=m!=='text';if(cv)cv.style.pointerEvents=draw?'auto':'none';if(cv)cv.style.cursor=draw?(m==='eraser'?'cell':'crosshair'):'';const tb=document.getElementById('note-tb'),ib=document.getElementById('inkbar');if(tb)tb.style.display=draw?'none':'flex';if(ib)ib.style.display=draw?'flex':'none';if(draw){const ed=document.getElementById('note-ed');if(ed)ed.blur();}}
/* ink colour popover (shares favourites / recents / palette) */
let _inkPop=null;
function openInkPop(btn){if(!_inkPop){_inkPop=document.createElement('div');_inkPop.className='color-pop';document.body.appendChild(_inkPop);document.addEventListener('mousedown',e=>{if(_inkPop.classList.contains('open')&&!_inkPop.contains(e.target)&&!btn.contains(e.target))_inkPop.classList.remove('open');});}renderInkPop();const r=btn.getBoundingClientRect();_inkPop.style.left=Math.max(6,Math.min(r.left,window.innerWidth-202))+'px';_inkPop.style.top=(r.bottom+6)+'px';_inkPop.classList.add('open');}
function renderInkPop(){let h='<div class="cp-row cp-current"><span class="cp-cur-sw" style="background:'+inkColor+'"></span><span>Current colour</span><span class="cp-cur-hex">'+inkColor+'</span></div><div class="cp-divider"></div><div class="cp-label">Favourites</div><div class="cp-fav-grid">';COLOR_FAVORITES.forEach(c=>h+='<button class="cp-fav" data-h="'+c+'" style="background:'+c+'"><span class="cp-x" data-rm="'+c+'">\u00d7</span></button>');h+='<button class="cp-fav-add" data-add="1">+</button></div>';if(COLOR_RECENTS.length){h+='<div class="cp-label">Recent</div><div class="cp-fav-grid">';COLOR_RECENTS.forEach(c=>h+='<button class="cp-fav" data-h="'+c+'" style="background:'+c+'"><span class="cp-star" data-fav="'+c+'">\u2605</span></button>');h+='</div>';}h+='<div class="cp-label">Palette</div><div class="cp-grid">';COLOR_PALETTE.forEach(c=>h+='<button class="cp-sw" data-h="'+c+'" style="background:'+c+'"></button>');h+='</div>';_inkPop.innerHTML=h;_inkPop.querySelectorAll('[data-h]').forEach(b=>b.onclick=e=>{if(e.target.dataset.rm){removeFavoriteColor(e.target.dataset.rm);renderInkPop();return;}if(e.target.dataset.fav){addFavoriteColor(e.target.dataset.fav);renderInkPop();return;}setInkColor(b.dataset.h);_inkPop.classList.remove('open');});const a=_inkPop.querySelector('[data-add]');if(a)a.onclick=()=>{if(addFavoriteColor(inkColor))renderInkPop();};}
function initInk(){inkBody=document.getElementById('note-body');noteScroll=document.getElementById('note-scroll');cv=document.getElementById('ink');ctx=cv.getContext('2d');sizeCanvas();
  noteScroll.addEventListener('scroll',redrawInk,{passive:true});
  if(window.ResizeObserver)new ResizeObserver(sizeCanvas).observe(inkBody);else window.addEventListener('resize',sizeCanvas);
  cv.addEventListener('pointerdown',e=>{if(mode==='text')return;if(e.button!==undefined&&e.button!==0)return;inkDrawing=true;curStroke={tool:mode,color:inkColor,size:inkSize,pts:[inkPt(e)]};try{cv.setPointerCapture(e.pointerId);}catch(_){}e.preventDefault();redrawInk();});
  cv.addEventListener('pointermove',e=>{if(!inkDrawing)return;curStroke.pts.push(inkPt(e));redrawInk();});
  cv.addEventListener('pointerup',e=>{if(!inkDrawing)return;inkDrawing=false;if(curStroke&&curStroke.pts.length){strokes.push(curStroke);inkRedo=[];saveStrokes();}curStroke=null;try{cv.releasePointerCapture(e.pointerId);}catch(_){}redrawInk();});
  cv.addEventListener('pointercancel',()=>{inkDrawing=false;curStroke=null;redrawInk();});
  cv.addEventListener('wheel',e=>{if(mode==='text')return;noteScroll.scrollTop+=e.deltaY;e.preventDefault();},{passive:false});
  document.querySelectorAll('#mode-bar .mbtn').forEach(b=>b.onclick=()=>setMode(b.dataset.mode));
  const icb=document.getElementById('ink-color');icb.onclick=e=>{e.stopPropagation();openInkPop(icb);};
  const sz=document.getElementById('ink-size');sz.oninput=()=>{inkSize=+sz.value;document.getElementById('ink-sizeval').textContent=sz.value;};
  document.getElementById('ink-clear').onclick=()=>{if(!strokes.length)return;inkRedo=strokes.slice();strokes=[];saveStrokes();redrawInk();};
  document.addEventListener('keydown',e=>{if(mode==='text')return;const k=e.key.toLowerCase();if((e.ctrlKey||e.metaKey)&&k==='z'&&!e.shiftKey){if(strokes.length){inkRedo.push(strokes.pop());saveStrokes();redrawInk();e.preventDefault();}}else if((e.ctrlKey||e.metaKey)&&(k==='y'||(k==='z'&&e.shiftKey))){if(inkRedo.length){strokes.push(inkRedo.pop());saveStrokes();redrawInk();e.preventDefault();}}});
  setMode('text');setInkColor(inkColor);
}

/* ---------- boot ---------- */
(async function(){
  await DB_loadColors();
  const editor=makeEditor('note-ed','note-tb','note-status','note-valign');
  window.editor=editor;
  try{const ss=await idbGet('strokes');strokes=Array.isArray(ss)?ss:[];}catch(e){}
  initInk();
  let lastNote='';
  try{const n=await idbGet('note');if(typeof n==='string'){editor.setHTML(n);lastNote=n;}}catch(e){}
  setInterval(()=>{try{const h=editor.getHTML();if(h!==lastNote){lastNote=h;idbSet('note',h);}}catch(e){}},1200);
  window.addEventListener('beforeunload',()=>{try{const h=editor.getHTML();if(h!==lastNote)idbSet('note',h);}catch(e){}});
  const sp=await idbGet('split');if(typeof sp==='number')window._setSplit(sp);
  const vInput=document.getElementById('yt-input');
  const vid=await idbGet('video');if(typeof vid==='string'&&vid){vInput.value=vid;pendingVideo=vid;ensureYT();}
  document.getElementById('yt-load').addEventListener('click',()=>loadVideo(vInput.value));
  vInput.addEventListener('keydown',e=>{if(e.key==='Enter')loadVideo(vInput.value);});
})();
</script>
